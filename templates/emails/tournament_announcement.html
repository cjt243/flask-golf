<div style="font-family: sans-serif; max-width: 600px; margin: 0 auto;">
    <h2 style="color: #16a34a;">{{ tournament_name }} is Open for Picks!</h2>
    <p>Hey {{ name }}, a new tournament is ready for your picks.</p>
    <p style="font-size: 16px; margin: 16px 0;">
        <strong>Entry fee:</strong> ${{ buy_in }}
    </p>
    <a href="{{ verify_url }}"
       style="display: inline-block; background: #16a34a; color: white; padding: 12px 24px;
              text-decoration: none; border-radius: 8px; margin: 16px 0;">
        Make Your Picks
    </a>
    <p style="color: #666; font-size: 14px;">
        This link expires in 48 hours. After that, sign in at the usual login page.
    </p>
</div>
